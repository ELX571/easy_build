<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat — EasyBuild</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
:root{--bg:#0a0d14;--sb:#0d1117;--border:rgba(255,255,255,.06);--text:#f1f5f9;--muted:#94a3b8;--label:#475569;--orange:#ff6b00;--ora:rgba(255,107,0,.12);--in:#1e293b;--divider:rgba(255,255,255,.05);--shadow:0 2px 16px rgba(0,0,0,.4)}
body{background:var(--bg);height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.shell{display:flex;width:100%;max-width:1300px;height:calc(100vh - 24px);margin:12px;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);border:1px solid var(--border)}

/* SIDEBAR */
.sb{width:320px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:8px;flex:1}
.logo-icon{width:34px;height:34px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.logo-text{font-size:16px;font-weight:800;color:var(--text)}
.logo-text em{color:var(--orange);font-style:normal}
.hbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;text-decoration:none;transition:.2s}
.hbtn:hover{color:var(--orange);border-color:var(--orange)}
.sb-search{padding:10px 14px;border-bottom:1px solid var(--divider)}
.si{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:9px 12px}
.si i{color:var(--label);font-size:12px}
.si input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:100%}
.si input::placeholder{color:var(--label)}
.contacts{flex:1;overflow-y:auto;padding:6px 0}
.contacts::-webkit-scrollbar{width:3px}
.contacts::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
.sec{font-size:10px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.8px;padding:12px 16px 6px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:.15s;position:relative}
.ci:hover{background:rgba(255,107,0,.04)}
.ci.active{background:var(--ora)}
.ci.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--orange);border-radius:0 3px 3px 0}
.av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
.avp{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.ci-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:11px;color:var(--label);white-space:nowrap}
.ci-prev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.odot{width:9px;height:9px;border-radius:50%;background:#22c55e;border:2px solid var(--sb);position:absolute;bottom:10px;left:46px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
.ch{background:var(--sb);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.ca-wrap{position:relative}
.ca{width:40px;height:40px;border-radius:50%;object-fit:cover}
.con-dot{width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid var(--sb);position:absolute;bottom:0;right:0}
.ci2{flex:1}
.cn{font-size:14px;font-weight:700;color:var(--text)}
.cs{font-size:12px;color:#22c55e;font-weight:500}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:3px}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--divider);border-radius:3px}
.dsep{text-align:center;margin:10px 0}
.dsep span{background:rgba(148,163,184,.1);color:var(--muted);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.mr{display:flex;align-items:flex-end;gap:7px;max-width:68%}
.mr.out{align-self:flex-end;flex-direction:row-reverse}
.mr.in{align-self:flex-start}
.mavp{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-bottom:2px}
.bub{padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.55;word-break:break-word;position:relative}
.bub.out{background:var(--orange);color:#fff;border-bottom-right-radius:4px}
.bub.in{background:var(--in);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.bm{display:flex;align-items:center;gap:4px;margin-top:3px;justify-content:flex-end}
.bt{font-size:10px;opacity:.65}
.bc{font-size:10px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:var(--label)}
.ei{width:72px;height:72px;border-radius:50%;background:var(--ora);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--orange)}
.empty h3{font-size:17px;font-weight:700;color:var(--text)}
.empty p{font-size:13px;color:var(--muted)}
.typing{font-size:12px;color:var(--muted);padding:0 20px 6px;display:none}
.input-area{background:var(--sb);border-top:1px solid var(--border);padding:12px 18px}
.ir{display:flex;align-items:flex-end;gap:8px}
.ib{flex:1;display:flex;align-items:flex-end;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:14px;padding:9px 12px;gap:8px;transition:.2s}
.ib:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px var(--ora)}
.ib textarea{flex:1;border:none;background:transparent;outline:none;font-size:13px;color:var(--text);resize:none;max-height:110px;line-height:1.5}
.ib textarea::placeholder{color:var(--label)}
.send{width:42px;height:42px;border-radius:12px;background:var(--orange);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;flex-shrink:0}
.send:hover{background:#e85e00;transform:scale(1.05)}
.send:active{transform:scale(.97)}

/* NEW CHAT PANEL */
.nc-panel{padding:28px 20px;display:flex;flex-direction:column;gap:14px}
.nc-panel h3{font-size:17px;font-weight:700;color:var(--text)}
.ur{display:flex;flex-direction:column;gap:4px}
.ui{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:12px;transition:.15s}
.ui:hover{background:rgba(255,107,0,.06)}
.ui-info .ui-name{font-size:13px;font-weight:700;color:var(--text)}
.ui-info .ui-un{font-size:11px;color:var(--muted)}

@media(max-width:768px){.sb{width:100%;position:absolute;z-index:10;height:100%}.sb.hide{display:none}.bk{display:flex!important}}
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<div class="sb" id="sb">
  <div class="sb-head">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-layer-group"></i></div>
      <span class="logo-text">Easy<em>Build</em></span>
    </div>
    <button class="hbtn" onclick="openNewChat()" title="Yangi chat"><i class="fa-solid fa-pen-to-square"></i></button>
    <a href="/" class="hbtn" title="Bosh sahifa"><i class="fa-solid fa-house"></i></a>
  </div>
  <div class="sb-search">
    <div class="si">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="srch" placeholder="Qidirish..." oninput="filterContacts(this.value)">
    </div>
  </div>
  <div class="contacts" id="contacts"><div class="sec">Suhbatlar</div></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="ch" id="ch" style="display:none">
    <button class="hbtn bk" id="bk" onclick="closeSidebar()" style="display:none"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="ca-wrap" style="cursor:pointer;" onclick="goToSettings()" title="Sozlamalarga o'tish">
      <img src="" class="ca" id="ca" onerror="this.style.display='none';document.getElementById('cap').style.display='flex'">
      <div class="avp ca" id="cap" style="display:none;width:40px;height:40px;font-size:15px"></div>
      <div class="con-dot" id="cdot" style="display:none"></div>
    </div>
    <div class="ci2">
      <div style="display:flex; align-items:center; gap:8px;">
          <div class="cn" id="cn">—</div>
          <button class="hbtn" id="edit-group-btn" style="display:none; width: 24px; height: 24px; font-size: 11px; border-radius: 6px; padding: 0; background: rgba(255,255,255,0.05);" onclick="renameGroup()">
              <i class="fa-solid fa-pen"></i>
          </button>
      </div>
      <div class="cs" id="cst">online</div>
    </div>
    <div style="display:flex;gap:6px;margin-left:auto">
      <button class="hbtn"><i class="fa-solid fa-phone"></i></button>
      <button class="hbtn"><i class="fa-solid fa-video"></i></button>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <div class="ei"><i class="fa-solid fa-comments"></i></div>
      <h3>Chatni tanlang</h3>
      <p>Chap tomondagi ro'yxatdan suhbat tanlang</p>
    </div>
  </div>

  <div class="typing" id="typing">✍️ yozmoqda...</div>

  <div class="input-area" id="ia" style="display:none">
    <div class="ir">
      <div class="ib">
        <textarea id="inp" rows="1" placeholder="Xabar yozing..." onkeydown="onKey(event)" oninput="resize(this);onType()"></textarea>
      </div>
      <button class="send" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<!-- GROUP SETTINGS MODAL -->
<div id="chat-settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); justify-content:center; align-items:center;">
    <div style="background:linear-gradient(145deg, rgba(30, 35, 50, 0.95), rgba(15, 17, 26, 0.95)); width:90%; max-width:380px; border-radius:24px; border:1px solid rgba(255, 107, 0, 0.2); box-shadow:0 15px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); overflow:hidden; display:flex; flex-direction:column; animation: fadeScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        
        <!-- Header -->
        <div style="padding:20px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02);">
            <h3 style="margin:0; font-size:16px; font-weight:800; color:#fff; display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-circle-info" style="color:var(--active-text-blue);"></i> Guruh Ma'lumotlari</h3>
            <button onclick="document.getElementById('chat-settings-modal').style.display='none'" style="background:rgba(255,255,255,0.05); border:none; color:#a1a1aa; cursor:pointer; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='#a1a1aa'"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <!-- Profile Info -->
        <div style="padding:30px 24px 24px 24px; text-align:center; position:relative;">
            <div id="csm-av-container" style="position:relative; width:100px; height:100px; margin:0 auto 16px auto; cursor:pointer;" onclick="document.getElementById('groupAvatarInput').click()" onmouseover="document.getElementById('csm-av-overlay').style.opacity='1'" onmouseout="document.getElementById('csm-av-overlay').style.opacity='0'">
                <div id="csm-av" style="width:100px; height:100px; border-radius:50%; display:flex; justify-content:center; align-items:center; overflow:hidden; border:3px solid transparent; background:linear-gradient(var(--bg-main), var(--bg-main)) padding-box, linear-gradient(45deg, var(--active-text-blue), #fb923c) border-box; box-shadow:0 8px 24px rgba(255, 107, 0, 0.2);"></div>
                <div id="csm-av-overlay" style="position:absolute; top:3px; left:3px; right:3px; bottom:3px; background:rgba(0,0,0,0.5); border-radius:50%; display:flex; justify-content:center; align-items:center; color:#fff; font-size:24px; opacity:0; transition:0.2s;"><i class="fa-solid fa-camera"></i></div>
            </div>
            <input type="file" id="groupAvatarInput" style="display:none" accept="image/*" onchange="uploadGroupAvatar(this)">
            
            <h2 id="csm-name" style="margin:0 0 4px 0; font-size:22px; font-weight:800; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.3);"></h2>
            <p style="margin:0; font-size:13px; font-weight:500; color:#fb923c; background:rgba(251, 146, 60, 0.1); padding:4px 12px; border-radius:12px; display:inline-block;" id="csm-count"></p>
        </div>
        
        <!-- Members List -->
        <div style="padding:0 24px 24px 24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h4 style="margin:0; font-size:11px; color:#94a3b8; font-weight:800; letter-spacing:1px; text-transform:uppercase;">A'zolar ro'yxati</h4>
            </div>
            <div id="csm-members" style="display:flex; flex-direction:column; gap:8px; max-height:180px; overflow-y:auto; padding-right:4px;"></div>
        </div>
        
        <!-- Actions -->
        <div style="padding:20px 24px; border-top:1px solid rgba(255,255,255,0.05); background:rgba(0,0,0,0.2); display:flex; gap:12px;">
            <button onclick="document.getElementById('chat-settings-modal').style.display='none'; renameGroup()" style="flex:1; padding:12px; background:rgba(255,255,255,0.03); color:#fff; border:1px solid rgba(255,255,255,0.1); border-radius:14px; cursor:pointer; font-weight:600; font-size:13px; display:flex; flex-direction:column; align-items:center; gap:6px; transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.03)'"><i class="fa-solid fa-pen" style="font-size:16px; color:#94a3b8;"></i> Nomni o'zgartirish</button>
            
            <a href="{% url 'build:profile_edit' %}#tab-team" style="flex:1; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:12px; background:linear-gradient(45deg, var(--active-text-blue), #fb923c); color:#fff; text-decoration:none; border-radius:14px; font-size:13px; font-weight:700; box-shadow:0 4px 15px rgba(255, 107, 0, 0.3); transition:0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(255, 107, 0, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(255, 107, 0, 0.3)'"><i class="fa-solid fa-users-gear" style="font-size:16px;"></i> To'liq sozlamalar</a>
        </div>
    </div>
</div>
<style>
@keyframes fadeScale { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes toastSlide { 0% { opacity: 0; transform: translateX(50px); } 100% { opacity: 1; transform: translateX(0); } }
@keyframes toastFadeOut { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); } }
/* Scrollbar stylings for the members list */
#csm-members::-webkit-scrollbar { width: 4px; }
#csm-members::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 4px; }
#csm-members::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>

<!-- RENAME GROUP MODAL -->
<div id="rename-group-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); justify-content:center; align-items:center;">
    <div style="background:linear-gradient(145deg, rgba(30, 35, 50, 0.95), rgba(15, 17, 26, 0.95)); width:90%; max-width:340px; border-radius:24px; border:1px solid rgba(255, 107, 0, 0.2); box-shadow:0 15px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); overflow:hidden; display:flex; flex-direction:column; animation: fadeScale 0.2s ease;">
        <div style="padding:20px 24px; border-bottom:1px solid rgba(255,255,255,0.05);">
            <h3 style="margin:0; font-size:16px; font-weight:800; color:#fff;">Guruh nomini o'zgartirish</h3>
        </div>
        <div style="padding:24px;">
            <input type="text" id="rename-group-input" style="width:100%; padding:14px 16px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-size:15px; outline:none; transition:0.2s;" onfocus="this.style.borderColor='var(--active-text-blue)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" placeholder="Yangi nomni kiriting...">
        </div>
        <div style="padding:16px 24px; background:rgba(0,0,0,0.2); border-top:1px solid rgba(255,255,255,0.05); display:flex; gap:12px; justify-content:flex-end;">
            <button onclick="document.getElementById('rename-group-modal').style.display='none'" style="padding:10px 20px; background:transparent; color:#94a3b8; border:none; cursor:pointer; font-weight:600; font-size:14px;">Bekor qilish</button>
            <button onclick="submitRenameGroup()" style="padding:10px 24px; background:linear-gradient(45deg, var(--active-text-blue), #fb923c); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px; box-shadow:0 4px 12px rgba(255, 107, 0, 0.2);">Saqlash</button>
        </div>
    </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast-container" style="position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:10px; z-index:10001; pointer-events:none;"></div>

</div>
<script>
window.showToast = function(msg, isError=false) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const bg = isError ? 'rgba(239, 68, 68, 0.9)' : 'rgba(34, 197, 94, 0.9)';
    const icon = isError ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-check"></i>';
    
    toast.style.cssText = `background:${bg}; color:#fff; padding:12px 20px; border-radius:12px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:10px; box-shadow:0 10px 25px rgba(0,0,0,0.3); backdrop-filter:blur(5px); animation:toastSlide 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);`;
    toast.innerHTML = `${icon} ${esc(msg)}`;
    
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'toastFadeOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
const ME={{ me_id }};
const CSRF='{{ csrf_token }}';
const COLORS=['#6366f1','#f59e0b','#10b981','#ec4899','#8b5cf6','#06b6d4','#f97316','#84cc16'];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const col=id=>COLORS[id%COLORS.length];
const ini=n=>n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

let roomId=null,contact=null,ws=null,allContacts=[],typingTimer=null;

// ── CONTACTS ──
async function loadContacts(){
  try{
    const r=await fetch('/chat/api/contacts/');
    const d=await r.json();
    allContacts=d.contacts||[];
    renderContacts(allContacts);
    
    const urlParams = new URLSearchParams(window.location.search);
    const urlRoomId = urlParams.get('room_id');
    if (urlRoomId && !roomId) {
        openRoom(parseInt(urlRoomId));
    }
  }catch(e){console.error(e)}
}

function renderContacts(list){
  const el=document.getElementById('contacts');
  if(!list.length){
    el.innerHTML='<div class="sec">Suhbatlar</div><div style="text-align:center;padding:40px 16px;color:var(--muted);font-size:12px">Hali suhbat yo\'q.<br>Yangi chat boshlang ✏️</div>';
    return;
  }
  el.innerHTML='<div class="sec">Suhbatlar</div>';
  list.forEach(c=>{
    const cl=col(c.room_id),in2=ini(c.name),ac=roomId===c.room_id;
    
    let av = '';
    if (c.avatar) {
        av = `<img src="${c.avatar}" class="av">`;
    } else if (c.is_group) {
        av = `<div class="avp" style="background: var(--active-text-blue)"><i class="fa-solid fa-users" style="color: #fff;"></i></div>`;
    } else {
        av = `<div class="avp" style="background:${col(c.user_id)}">${in2}</div>`;
    }
    
    const d=document.createElement('div');
    d.className='ci'+(ac?' active':'');
    d.id='ci_'+c.room_id;
    const prevText = c.last_message?.startsWith('__TEAM_INVITE__') ? '🤝 Jamoaga taklif' : esc(c.last_message||'');
    d.innerHTML=`${av}${(c.online && !c.is_group)?'<div class="odot"></div>':''}<div class="ci-info"><div class="ci-top"><span class="ci-name">${esc(c.name)}</span><span class="ci-time">${c.last_time||''}</span></div><div class="ci-prev">${prevText}</div></div>${c.unread>0?`<div class="badge">${c.unread}</div>`:''}`;
    d.onclick=()=>openRoom(c.room_id);
    el.appendChild(d);
  });
}

// ── OPEN ROOM ──
async function openRoom(id){
  roomId=id;
  contact=allContacts.find(c=>c.room_id===id);
  renderContacts(allContacts);
  document.getElementById('empty')?.remove();
  document.getElementById('nc')?.remove();
  if(contact){
    document.getElementById('ch').style.display='flex';
    document.getElementById('ia').style.display='block';
    
    // Add click handler to navigate to settings
    document.getElementById('cn').innerHTML = `<span style="cursor:pointer;" onclick="goToSettings()" title="Sozlamalarga o'tish">${esc(contact.name)}</span>`;
    
    const cap=document.getElementById('cap');
    const ca=document.getElementById('ca');
    
    if (contact.avatar) {
        ca.src = contact.avatar;
        ca.style.display = 'block';
        cap.style.display = 'none';
    } else if (contact.is_group) {
        cap.style.display='flex';cap.style.background='var(--active-text-blue)';cap.innerHTML='<i class="fa-solid fa-users" style="color:#fff;"></i>';
        ca.style.display='none';
    } else {
        const cl=col(contact.user_id),in2=ini(contact.name);
        cap.style.display='flex';cap.style.background=cl;cap.textContent=in2;
        ca.style.display='none';
    }
    
    if (contact.is_group) {
        document.getElementById('cdot').style.display='none';document.getElementById('cst').textContent='Jamoa guruhi';
        document.getElementById('edit-group-btn').style.display='inline-flex';
    } else {
        document.getElementById('edit-group-btn').style.display='none';
        if(contact.online){document.getElementById('cdot').style.display='block';document.getElementById('cst').textContent='online';}
        else{document.getElementById('cdot').style.display='none';document.getElementById('cst').textContent='offline';document.getElementById('cst').style.color='var(--muted)';}
    }
  }
  await loadMessages(id);
  connectWS(id);
  document.getElementById('inp').focus();
}

function goToSettings() {
    if (contact && contact.is_group) {
        const mod = document.getElementById('chat-settings-modal');
        const mAv = document.getElementById('csm-av');
        const mName = document.getElementById('csm-name');
        const mCount = document.getElementById('csm-count');
        const mMem = document.getElementById('csm-members');
        
        mName.textContent = contact.name;
        
        if (contact.avatar) {
            mAv.innerHTML = `<img src="${contact.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            mAv.innerHTML = `<div style="width:100%; height:100%; background:var(--active-text-blue); display:flex; justify-content:center; align-items:center; color:#fff; font-size:36px;"><i class="fa-solid fa-users"></i></div>`;
        }
        
        const parts = contact.participants || [];
        mCount.textContent = parts.length > 0 ? `${parts.length} ta a'zo` : "Hali a'zolar yo'q";
        
        mMem.innerHTML = '';
        parts.forEach(p => {
            let pav = p.avatar ? `<img src="${p.avatar}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid rgba(255,255,255,0.1);">` : `<div style="width:40px; height:40px; border-radius:50%; background:${col(p.id)}; display:flex; justify-content:center; align-items:center; color:#fff; font-size:16px; border:1px solid rgba(255,255,255,0.1);">${ini(p.name)}</div>`;
            mMem.innerHTML += `<div style="display:flex; align-items:center; gap:12px; padding:10px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); transition:0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='rgba(255,255,255,0.03)'">${pav} <span style="font-size:14px; font-weight:600; color:#fff;">${esc(p.name)}</span></div>`;
        });
        
        mod.style.display = 'flex';
    } else {
        showToast("Shaxsiy chatlar uchun sozlamalar mavjud emas.", true);
    }
}

// ── MESSAGES ──
async function loadMessages(id){
  const w=document.getElementById('msgs');
  w.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Yuklanmoqda...</div>';
  try{
    const r=await fetch(`/chat/api/messages/${id}/?limit=100`);
    const d=await r.json();
    renderMessages(d.messages||[]);
  }catch(e){w.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Xabarlar yuklanmadi</div>';}
}

function renderMessages(msgs){
  const w=document.getElementById('msgs');
  w.innerHTML='';
  if(!msgs.length){w.innerHTML='<div style="text-align:center;margin-top:60px;color:var(--muted);font-size:13px">Birinchi xabarni yuboring! 👋</div>';return;}
  msgs.forEach(m=>appendMsg(m,false));
  w.scrollTop=w.scrollHeight;
}

function appendMsg(m,scroll=true){
  const w=document.getElementById('msgs');
  const sid=m.sender_id??m.from;
  const txt=m.content??m.message??m.text??'';
  const isOut=sid===ME;

  const in2=m.sender_name?ini(m.sender_name):(contact?ini(contact.name):'?');
  const read=m.is_read??true;

          <div style="font-weight: 800; font-size: 15px; margin-bottom: 6px; color: #fff; display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-user-plus" style="background: rgba(255,255,255,0.2); padding: 6px; border-radius: 8px; font-size: 12px;"></i> Jamoaga taklif!
          </div>
          <p style="font-size: 13px; margin-bottom: 12px; color: rgba(255,255,255,0.85); line-height: 1.4;">Sizni qurilish jamoasiga taklif qilishdi.</p>
          <div style="font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 6px;">
            <i class="fa-solid fa-clock"></i> Taklif yuborildi (Kutilmoqda...)
          </div>
        </div>
      `;
    } else {
      displayHtml = `
        <div id="invite_box_${inviteId}" style="background: var(--bg); border: 1px solid var(--border); padding: 16px; border-radius: 16px; margin-top: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);">
          <div style="font-weight: 800; font-size: 15px; margin-bottom: 8px; color: var(--orange); display: flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-users" style="background: rgba(255,107,0,0.1); padding: 8px; border-radius: 8px; font-size: 14px;"></i> Jamoaga taklif!
          </div>
          <p style="font-size: 14px; margin-bottom: 16px; color: var(--muted); line-height: 1.5;">Sizni nufuzli qurilish jamoasiga taklif qilishmoqda.</p>
          <div style="display: flex; gap: 10px;">
            <button onclick="respondInvite(${inviteId}, 'accept')" style="flex: 1; padding: 10px; background: #22c55e; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.2s; box-shadow: 0 4px 12px rgba(34,197,94,0.3); display: flex; align-items: center; justify-content: center; gap: 6px;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'"><i class="fa-solid fa-check"></i> Qabul qilish</button>
            <button onclick="respondInvite(${inviteId}, 'reject')" style="flex: 1; padding: 10px; background: #ef4444; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.2s; box-shadow: 0 4px 12px rgba(239,68,68,0.3); display: flex; align-items: center; justify-content: center; gap: 6px;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'"><i class="fa-solid fa-xmark"></i> Rad etish</button>
          </div>
        </div>
      `;
    }
  } else if (txt.startsWith('__TEAM_INVITE_ACCEPTED__:')) {
    if (isOut) {
        displayHtml = `
          <div style="background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;">
            <div style="background: #22c55e; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-check"></i></div>
            <div style="font-weight: 700; font-size: 14px; color: #fff;">Taklif qabul qilindi</div>
          </div>
        `;
    } else {
        displayHtml = `
          <div style="background: rgba(34,197,94,0.1); border: 1px solid #22c55e; padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;">
            <div style="background: #22c55e; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-check"></i></div>
            <div style="font-weight: 700; font-size: 14px; color: #22c55e;">Siz taklifni qabul qildingiz</div>
          </div>
        `;
    }
  } else if (txt.startsWith('__TEAM_INVITE_REJECTED__:')) {
    if (isOut) {
        displayHtml = `
          <div style="background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.2); padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;">
            <div style="background: #ef4444; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-xmark"></i></div>

          </div>
        `;
    } else {
        displayHtml = `
          <div style="background: rgba(239,68,68,0.1); border: 1px solid #ef4444; padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;">
            <div style="background: #ef4444; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-xmark"></i></div>

  w.appendChild(row);

}

window.respondInvite = async function(id, action) {
    try {
        const res = await fetch(`/api/team/invite/${id}/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': CSRF},
            body: JSON.stringify({action: action})
        });
        const data = await res.json();
        if (data.success) {
            const box = document.getElementById(`invite_box_${id}`);
            if (box) {
                if (action === 'accept') {
                    box.outerHTML = '<div style="background: rgba(34,197,94,0.1); border: 1px solid #22c55e; padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;"><div style="background: #22c55e; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-check"></i></div><div style="font-weight: 700; font-size: 14px; color: #22c55e;">Siz taklifni qabul qildingiz</div></div>';
                } else {
                    box.outerHTML = '<div style="background: rgba(239,68,68,0.1); border: 1px solid #ef4444; padding: 12px 16px; border-radius: 12px; margin-top: 4px; display: flex; align-items: center; gap: 10px;"><div style="background: #ef4444; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px;"><i class="fa-solid fa-xmark"></i></div><div style="font-weight: 700; font-size: 14px; color: #ef4444;">Siz taklifni rad etdingiz</div></div>';
                }
            }
        } else {
            showToast(data.error, true);
        }
    } catch(e) { console.error(e); }
}

// ── WEBSOCKET ──
function connectWS(id){
  if(ws){ws.onclose=null;ws.close();}
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/chat/${id}/`);
  ws.onopen=()=>console.log('WS OK',id);
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='message'){
      appendMsg(d,true);
      const c=allContacts.find(x=>x.room_id===roomId);
      if(c){c.last_message=d.message;c.last_time=d.time;}
      renderContacts(allContacts);
      if(d.sender_id!==ME)ws.send(JSON.stringify({type:'read_receipt'}));
    }else if(d.type==='read_receipt'){
      // checkmarks update
    }else if(d.type==='typing'){
      const t=document.getElementById('typing');
      t.style.display=d.is_typing?'block':'none';
    }
  };
  ws.onerror=()=>console.error('WS error');
  ws.onclose=()=>console.log('WS closed');
}

// ── SEND ──
function send(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt||!roomId)return;
  if(!ws||ws.readyState!==WebSocket.OPEN){showToast('Ulanish yo\'q. Sahifani yangilang.', true);return;}
  ws.send(JSON.stringify({type:'message',message:txt}));
  inp.value='';inp.style.height='auto';
}

// ── TYPING ──
function onType(){
  if(!ws||ws.readyState!==WebSocket.OPEN)return;
  ws.send(JSON.stringify({type:'typing',is_typing:true}));
  clearTimeout(typingTimer);
  typingTimer=setTimeout(()=>ws.readyState===WebSocket.OPEN&&ws.send(JSON.stringify({type:'typing',is_typing:false})),2000);
}

// ── NEW CHAT ──
async function openNewChat(){
  roomId=null;contact=null;
  if(ws){ws.onclose=null;ws.close();ws=null;}
  document.getElementById('ch').style.display='none';
  document.getElementById('ia').style.display='none';
  document.getElementById('empty')?.remove();
  document.getElementById('nc')?.remove();
  const w=document.getElementById('msgs');
  w.innerHTML='';
  const p=document.createElement('div');
  p.id='nc';p.className='nc-panel';
  p.innerHTML=`<h3>Yangi suhbat</h3><div class="si" style="border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--border)"><i class="fa-solid fa-magnifying-glass" style="color:var(--label)"></i><input id="uq" placeholder="Foydalanuvchi qidirish..." oninput="searchU(this.value)" style="border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:100%"></div><div class="ur" id="ur"></div>`;
  w.appendChild(p);
  setTimeout(()=>document.getElementById('uq')?.focus(),50);
  searchU('');
}

async function searchU(q){
  try{
    const r=await fetch(`/chat/api/users/?q=${encodeURIComponent(q)}`);
    const d=await r.json();
    const el=document.getElementById('ur');if(!el)return;
    el.innerHTML='';
    (d.users||[]).forEach(u=>{
      const cl=col(u.id),in2=ini(u.name);
      const div=document.createElement('div');
      div.className='ui';
      div.innerHTML=`<div class="avp" style="background:${cl};width:38px;height:38px;border-radius:50%;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">${in2}</div><div class="ui-info"><div class="ui-name">${esc(u.name)}</div><div class="ui-un">@${esc(u.username)}${u.role?' · '+esc(u.role):''}</div></div>`;
      div.onclick=()=>startChat(u.id);
      el.appendChild(div);
    });
    if(!d.users?.length)el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0">Topilmadi</div>';
  }catch(e){console.error(e);}
}

async function startChat(uid){
  try{
    const r=await fetch('/chat/api/start/',{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},body:JSON.stringify({user_id:uid})});
    const d=await r.json();
    if(d.room_id){await loadContacts();openRoom(d.room_id);}
  }catch(e){console.error(e);}
}

// ── FILTER ──
function filterContacts(q){
  const f=q?allContacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())):allContacts;
  renderContacts(f);
}

// ── HELPERS ──
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function closeSidebar(){document.getElementById('sb').classList.add('hide');}

// ── UPDATE GROUP ──
window.renameGroup = async function() {
    if (!roomId || !contact || !contact.is_group) return;
    const mod = document.getElementById('rename-group-modal');
    const inp = document.getElementById('rename-group-input');
    inp.value = contact.name;
    mod.style.display = 'flex';
    inp.focus();
}

window.submitRenameGroup = function() {
    const inp = document.getElementById('rename-group-input');
    const newName = inp.value;
    if (!newName || newName.trim() === "" || newName === contact.name) {
        document.getElementById('rename-group-modal').style.display = 'none';
        return;
    }
    document.getElementById('rename-group-modal').style.display = 'none';
    updateGroupData({name: newName.trim()});
}

window.uploadGroupAvatar = async function(input) {
    if (!roomId || !contact || !contact.is_group || !input.files || input.files.length === 0) return;
    updateGroupData({avatar: input.files[0]});
    input.value = ""; // reset
}

async function updateGroupData(data) {
    try {
        const formData = new FormData();
        if (data.name) formData.append('name', data.name);
        if (data.avatar) formData.append('avatar', data.avatar);
        
        const res = await fetch(`/chat/api/group/${roomId}/update/`, {
            method: 'POST',
            headers: {'X-CSRFToken': CSRF},
            body: formData
        });
        const resp = await res.json();
        if (resp.success) {
            if (data.name) {
                document.getElementById('cn').innerHTML = `<span style="cursor:pointer;" onclick="goToSettings()" title="Sozlamalarga o'tish">${esc(resp.new_name)}</span>`;
                document.getElementById('csm-name').textContent = resp.new_name;
                contact.name = resp.new_name;
                const item = document.getElementById('ci_' + roomId);
                if (item) item.querySelector('.ci-name').textContent = resp.new_name;
            }
            if (resp.avatar_url) {
                contact.avatar = resp.avatar_url;
                document.getElementById('ca').src = resp.avatar_url;
                document.getElementById('ca').style.display = 'block';
                document.getElementById('cap').style.display = 'none';
                document.getElementById('csm-av').innerHTML = `<img src="${resp.avatar_url}" style="width:100%; height:100%; object-fit:cover;">`;
                const item = document.getElementById('ci_' + roomId);
                if (item) {
                    const avWrap = item.querySelector('.av') || item.querySelector('.avp');
                    if (avWrap) avWrap.outerHTML = `<img src="${resp.avatar_url}" class="av">`;
                }
            }
        } else {
            showToast(resp.error, true);
        }
    } catch(e) {
        console.error(e);
        showToast("Xatolik yuz berdi", true);
    }
}

// ── INIT ──
loadContacts();
