<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — EasyBuild</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f4f6fa;--sidebar-bg:#ffffff;--chat-bg:#f0f2f5;
  --panel:rgba(255,255,255,0.9);--border:rgba(0,0,0,0.07);
  --text:#0f172a;--muted:#64748b;--label:#94a3b8;
  --orange:#ff6b00;--orange-l:rgba(255,107,0,0.10);
  --msg-out:#ff6b00;--msg-in:#ffffff;
  --msg-out-text:#fff;--msg-in-text:#0f172a;
  --input-bg:#f8fafc;--divider:#e2e8f0;
  --hover:rgba(255,107,0,0.06);--active:rgba(255,107,0,0.10);
  --shadow:0 2px 12px rgba(0,0,0,0.06);
}
[data-theme="dark"]{
  --bg:#05070c;--sidebar-bg:#0d1117;--chat-bg:#0a0d14;
  --panel:rgba(13,17,23,0.95);--border:rgba(255,255,255,0.06);
  --text:#f1f5f9;--muted:#94a3b8;--label:#475569;
  --msg-out:#ff6b00;--msg-in:#1e293b;
  --msg-out-text:#fff;--msg-in-text:#f1f5f9;
  --input-bg:#1e293b;--divider:rgba(255,255,255,0.05);
  --hover:rgba(255,107,0,0.04);--active:rgba(255,107,0,0.10);
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.chat-shell{display:flex;width:100%;max-width:1280px;height:calc(100vh - 32px);margin:16px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.12);border:1px solid var(--border);}

/* ── SIDEBAR ── */
.sidebar{width:340px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:12px;}
.sidebar-logo{display:flex;align-items:center;gap:8px;flex:1;}
.logo-icon{width:34px;height:34px;background:var(--orange);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
.logo-text{font-size:17px;font-weight:800;color:var(--text);}
.logo-text em{color:var(--orange);font-style:normal;}
.header-actions{display:flex;gap:6px;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.icon-btn:hover{color:var(--orange);border-color:var(--orange);}
.search-wrap{padding:12px 14px;border-bottom:1px solid var(--divider);}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:9px 13px;}
.search-inner i{color:var(--label);font-size:13px;}
.search-inner input{border:none;background:transparent;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);width:100%;}
.search-inner input::placeholder{color:var(--label);}
.contacts-list{flex:1;overflow-y:auto;padding:6px 0;}
.contacts-list::-webkit-scrollbar{width:4px;}
.contacts-list::-webkit-scrollbar-thumb{background:var(--divider);border-radius:4px;}
.section-lbl{font-size:11px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 6px;}
.contact-item{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;transition:background .18s;position:relative;}
.contact-item:hover{background:var(--hover);}
.contact-item.active{background:var(--active);}
.contact-item.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--orange);border-radius:0 3px 3px 0;}
.avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--divider);}
.avatar-placeholder{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;}
.contact-info{flex:1;min-width:0;}
.contact-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.contact-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-time{font-size:11px;color:var(--label);white-space:nowrap;margin-left:8px;}
.contact-preview{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{background:var(--orange);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;}
.online-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;border:2px solid var(--sidebar-bg);position:absolute;bottom:11px;left:48px;}

/* ── MAIN CHAT ── */
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--chat-bg);min-width:0;}
.chat-header{background:var(--sidebar-bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
.chat-back{display:none;width:32px;height:32px;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:16px;align-items:center;justify-content:center;}
.chat-avatar-wrap{position:relative;}
.chat-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;}
.chat-online{width:12px;height:12px;border-radius:50%;background:#22c55e;border:2px solid var(--sidebar-bg);position:absolute;bottom:0;right:0;}
.chat-info{flex:1;}
.chat-name{font-size:15px;font-weight:700;color:var(--text);}
.chat-status{font-size:12px;color:#22c55e;font-weight:500;}
.chat-actions{display:flex;gap:6px;}

/* Messages */
.messages-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:4px;}
.messages-wrap::-webkit-scrollbar{width:4px;}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--divider);border-radius:4px;}
.date-sep{text-align:center;margin:12px 0;}
.date-sep span{background:rgba(148,163,184,0.15);color:var(--muted);font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:70%;}
.msg-row.out{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.in{align-self:flex-start;}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;object-fit:cover;margin-bottom:2px;}
.msg-avatar-placeholder{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-bottom:2px;}
.bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;position:relative;}
.bubble.out{background:var(--msg-out);color:var(--msg-out-text);border-bottom-right-radius:5px;}
.bubble.in{background:var(--msg-in);color:var(--msg-in-text);border-bottom-left-radius:5px;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.bubble-meta{display:flex;align-items:center;gap:5px;margin-top:4px;justify-content:flex-end;}
.bubble-time{font-size:11px;opacity:.7;}
.bubble-check{font-size:11px;}
.msg-tail-out{position:absolute;bottom:0;right:-6px;width:0;height:0;border-left:7px solid var(--msg-out);border-bottom:7px solid transparent;}
.msg-tail-in{position:absolute;bottom:0;left:-6px;width:0;height:0;border-right:7px solid var(--msg-in);border-bottom:7px solid transparent;}
.msg-row.in .msg-avatar,.msg-row.in .msg-avatar-placeholder{order:-1;}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--label);}
.no-chat-icon{width:80px;height:80px;border-radius:50%;background:var(--orange-l);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--orange);}
.no-chat h3{font-size:18px;font-weight:700;color:var(--text);}
.no-chat p{font-size:14px;color:var(--muted);}

/* Input */
.chat-input-area{background:var(--sidebar-bg);border-top:1px solid var(--border);padding:14px 20px;}
.input-row{display:flex;align-items:flex-end;gap:10px;}
.attach-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s;}
.attach-btn:hover{color:var(--orange);border-color:var(--orange);}
.input-box{flex:1;display:flex;align-items:flex-end;background:var(--input-bg);border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;gap:8px;transition:all .22s;}
.input-box:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-l);}
.input-box textarea{flex:1;border:none;background:transparent;outline:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--text);resize:none;max-height:120px;line-height:1.5;}
.input-box textarea::placeholder{color:var(--label);}
.emoji-btn{color:var(--label);cursor:pointer;font-size:18px;flex-shrink:0;transition:color .2s;background:none;border:none;}
.emoji-btn:hover{color:var(--orange);}
.send-btn{width:44px;height:44px;border-radius:13px;background:var(--orange);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all .22s;}
.send-btn:hover{background:#e85e00;transform:scale(1.05);}
.send-btn:active{transform:scale(.97);}

/* Empty state wrapper when no contact selected */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;}

@media(max-width:768px){
  .sidebar{width:100%;position:absolute;z-index:10;height:100%;}
  .sidebar.hidden{display:none;}
  .chat-back{display:flex;}
}
</style>
</head>
<body>

<div class="chat-shell">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon"><i class="fa-solid fa-layer-group"></i></div>
        <span class="logo-text">Easy<em>Build</em></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Tema"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
        <button class="icon-btn" title="Yangi chat"><i class="fa-solid fa-pen-to-square"></i></button>
        <a href="/" class="icon-btn" title="Bosh sahifa"><i class="fa-solid fa-house"></i></a>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-inner">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Qidirish..." oninput="filterContacts(this.value)">
      </div>
    </div>

    <div class="contacts-list" id="contactsList">
      <div class="section-lbl">So'nggi xabarlar</div>
      <!-- Contacts will be rendered by JS -->
    </div>
  </div>

  <!-- ── MAIN CHAT ── -->
  <div class="chat-main" id="chatMain">

    <!-- Header (hidden when no chat open) -->
    <div class="chat-header" id="chatHeader" style="display:none;">
      <button class="chat-back icon-btn" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></button>
      <div class="chat-avatar-wrap">
        <img src="" alt="" class="chat-avatar" id="chatAvatar"
             onerror="this.style.display='none';document.getElementById('chatAvatarFallback').style.display='flex'">
        <div id="chatAvatarFallback" class="avatar-placeholder" style="display:none;width:42px;height:42px;font-size:16px;"></div>
        <div class="chat-online"></div>
      </div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">—</div>
        <div class="chat-status" id="chatStatus">online</div>
      </div>
      <div class="chat-actions">
        <button class="icon-btn" title="Qo'ng'iroq"><i class="fa-solid fa-phone"></i></button>
        <button class="icon-btn" title="Video"><i class="fa-solid fa-video"></i></button>
        <button class="icon-btn" title="Profil"><i class="fa-solid fa-ellipsis-vertical"></i></button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-wrap" id="messagesWrap">
      <div class="empty-state" id="emptyState">
        <div class="no-chat-icon"><i class="fa-solid fa-comments"></i></div>
        <h3>Chatni tanlang</h3>
        <p>Chap tomondagi ro'yxatdan suhbat tanlang</p>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area" id="inputArea" style="display:none;">
      <div class="input-row">
        <button class="attach-btn" title="Fayl yuborish"><i class="fa-solid fa-paperclip"></i></button>
        <div class="input-box">
          <button class="emoji-btn">😊</button>
          <textarea id="msgInput" rows="1" placeholder="Xabar yozing..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" onclick="sendMessage()" title="Yuborish">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// ── CONFIG: Backend tayyor bo'lgandan keyin bu yerlarni o'zgartiring ──
// const WS_URL  = `ws://${location.host}/ws/chat/{room_id}/`;
// const API_URL = '/api/chat/messages/?room={room_id}';
// const ME_ID   = {{ request.user.id }};

// ── DEMO DATA (backend ulanganda o'chiring) ──
const ME = { id: 1, name: '{{ request.user.username|default:"Siz" }}' };

const CONTACTS = [
  { id: 2, name: 'Alisher Karimov', role: 'Usta', color: '#6366f1', unread: 3, lastMsg: 'Xayrli kun! Loyiha haqida...', time: '14:32', online: true, room: 'room_2' },
  { id: 3, name: 'Dilnoza Yusupova', role: 'Mijoz', color: '#f59e0b', unread: 0, lastMsg: 'Rahmat, ko\'rib chiqaman', time: '13:15', online: false, room: 'room_3' },
  { id: 4, name: 'Bobur Toshmatov', role: 'Usta', color: '#10b981', unread: 1, lastMsg: 'Narx bo\'yicha kelishamiz', time: 'Kecha', online: true, room: 'room_4' },
  { id: 5, name: 'Kamola Nazarova', role: 'Mijoz', color: '#ec4899', unread: 0, lastMsg: 'Qachon boshlaymiz?', time: 'Dush', online: false, room: 'room_5' },
  { id: 6, name: 'Sardor Rakhimov', role: 'Usta', color: '#8b5cf6', unread: 0, lastMsg: 'OK, bo\'ladi', time: 'Yak', online: false, room: 'room_6' },
];

const DEMO_MSGS = {
  room_2: [
    { id:1, from:2, text:"Assalomu alaykum! Siz loyiha haqida so'ragandingiz?", time:'13:50', read:true },
    { id:2, from:1, text:"Wa alaykum assalom! Ha, 3 xonali uy qurishni rejalashtirmoqdaman.", time:'13:52', read:true },
    { id:3, from:2, text:"Juda yaxshi. Qaysi hududda? Va taxminiy byudjet qancha?", time:'13:53', read:true },
    { id:4, from:1, text:"Toshkent shahri, Yunusobod tumani. Byudjet 80-100 mln so'm atrofida.", time:'13:55', read:true },
    { id:5, from:2, text:"Tushunarli. Men bu narxda sifatli ish bajargan loyihalarim bor. Ertaga uchrashuvga vaqtingiz bormi?", time:'14:20', read:true },
    { id:6, from:1, text:"Ha, ertaga soat 10:00 da bo'ladi.", time:'14:25', read:true },
    { id:7, from:2, text:"Xayrli kun! Loyiha haqida batafsilroq gaplashsak bo'ladimi?", time:'14:32', read:false },
  ],
  room_3: [
    { id:1, from:3, text:"Salom, men uyimni ta'mirlashni xohlayman.", time:'12:00', read:true },
    { id:2, from:1, text:"Xush kelibsiz! Qanday ishlar kerak?", time:'12:05', read:true },
    { id:3, from:3, text:"Rahmat, ko'rib chiqaman", time:'13:15', read:true },
  ],
};

let activeRoom = null;
let socket = null;
let allContacts = [...CONTACTS];

// ── RENDER CONTACTS ──
function renderContacts(list) {
  const el = document.getElementById('contactsList');
  el.innerHTML = '<div class="section-lbl">So\'nggi xabarlar</div>';
  list.forEach(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    el.innerHTML += `
    <div class="contact-item ${activeRoom===c.room?'active':''}" onclick="openChat(${JSON.stringify(c).replace(/"/g,'&quot;')})" id="contact_${c.room}">
      <div class="avatar-placeholder" style="background:${c.color}">${initials}</div>
      ${c.online?'<div class="online-dot"></div>':''}
      <div class="contact-info">
        <div class="contact-top">
          <span class="contact-name">${c.name}</span>
          <span class="contact-time">${c.time}</span>
        </div>
        <div class="contact-preview">${c.lastMsg}</div>
      </div>
      ${c.unread>0?`<div class="badge">${c.unread}</div>`:''}
    </div>`;
  });
}

// ── OPEN CHAT ──
function openChat(c) {
  activeRoom = c.room;
  renderContacts(allContacts);
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'block';
  document.getElementById('chatName').textContent = c.name;
  document.getElementById('chatStatus').textContent = c.online ? 'online' : 'offline';
  document.getElementById('chatStatus').style.color = c.online ? '#22c55e' : 'var(--muted)';

  const fa = document.getElementById('chatAvatarFallback');
  fa.style.display = 'flex';
  fa.style.background = c.color;
  fa.textContent = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // Mark unread = 0
  const contact = allContacts.find(x=>x.room===c.room);
  if (contact) contact.unread = 0;

  renderMessages(c.room);
  document.getElementById('msgInput').focus();

  // 🔌 WebSocket — backend tayyor bo'lgandan keyin uncommit qiling:
  // if (socket) socket.close();
  // socket = new WebSocket(`ws://${location.host}/ws/chat/${c.room}/`);
  // socket.onmessage = e => appendMessage(JSON.parse(e.data), true);
}

// ── RENDER MESSAGES ──
function renderMessages(room) {
  const wrap = document.getElementById('messagesWrap');
  const msgs = DEMO_MSGS[room] || [];
  wrap.innerHTML = '';

  if (!msgs.length) {
    wrap.innerHTML = '<div style="text-align:center;margin-top:40px;color:var(--muted);font-size:14px;">Hali xabar yo\'q. Birinchi xabarni yuboring! 👋</div>';
    return;
  }

  wrap.innerHTML = '<div class="date-sep"><span>Bugun</span></div>';
  msgs.forEach(m => appendMessage(m, false));
  wrap.scrollTop = wrap.scrollHeight;
}

function appendMessage(m, scroll=true) {
  const wrap = document.getElementById('messagesWrap');
  const isOut = m.from === ME.id;
  const c = allContacts.find(x=>x.id===m.from);
  const color = c ? c.color : '#64748b';
  const initials = c ? c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?';

  const row = document.createElement('div');
  row.className = `msg-row ${isOut?'out':'in'}`;
  row.innerHTML = `
    ${!isOut?`<div class="msg-avatar-placeholder" style="background:${color}">${initials}</div>`:''}
    <div class="bubble ${isOut?'out':'in'}">
      ${m.text}
      <div class="bubble-meta">
        <span class="bubble-time">${m.time}</span>
        ${isOut?`<i class="fa-solid fa-check-double bubble-check" style="color:${m.read?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.5)'}"></i>`:''}
      </div>
    </div>`;
  wrap.appendChild(row);
  if (scroll) wrap.scrollTop = wrap.scrollHeight;
}

// ── SEND MESSAGE ──
function sendMessage() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text || !activeRoom) return;

  const msg = { id: Date.now(), from: ME.id, text, time: new Date().toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'}), read: false };

  if (!DEMO_MSGS[activeRoom]) DEMO_MSGS[activeRoom] = [];
  DEMO_MSGS[activeRoom].push(msg);
  appendMessage(msg);

  // Update sidebar preview
  const c = allContacts.find(x=>x.room===activeRoom);
  if (c) { c.lastMsg = text; c.time = msg.time; }
  renderContacts(allContacts);

  inp.value = '';
  inp.style.height = 'auto';

  // 🔌 WebSocket send — backend tayyor bo'lgandan keyin:
  // if (socket && socket.readyState === WebSocket.OPEN)
  //   socket.send(JSON.stringify({ message: text }));
}

function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function closeChat() {
  activeRoom = null;
  document.getElementById('chatHeader').style.display='none';
  document.getElementById('inputArea').style.display='none';
  document.getElementById('messagesWrap').innerHTML='<div class="empty-state"><div class="no-chat-icon"><i class="fa-solid fa-comments"></i></div><h3>Chatni tanlang</h3><p>Chap tomondagi ro\'yxatdan suhbat tanlang</p></div>';
  renderContacts(allContacts);
}
function filterContacts(q) {
  const filtered = q ? allContacts.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())) : allContacts;
  renderContacts(filtered);
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.getElementById('themeIcon').className = next==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
}

// Init
const saved = localStorage.getItem('theme')||'light';
document.documentElement.setAttribute('data-theme',saved);
document.getElementById('themeIcon').className = saved==='dark'?'fa-solid fa-sun':'fa-solid fa-moon';
renderContacts(allContacts);
</script>
