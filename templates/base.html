{% load static tailwind_tags %}
<!DOCTYPE html>
<!-- Tilni dinamik o'qiydigan qildim, SEO va brauzerlar uchun muhim -->
<html lang="{{ request.LANGUAGE_CODE|default:'uz' }}" class="dark">

<head>
    <meta charset="UTF-8">
    <!-- Mobil qurilmalarda masshtabni to'g'ri ushlab turish va UI buzilmasligi uchun viewport yangilandi -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#05070c" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f4f6fa" media="(prefers-color-scheme: light)">
    <title>{% block title %}Easy Build{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}?v=2">

    {% tailwind_css %}

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .bg-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70vh; color: var(--watermark-color); opacity: var(--watermark-opacity); z-index: -2; pointer-events: none; transition: all 0.4s ease; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* 📱 MOBIL VA PREMIUM FORM STYLES */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem; /* Telefonda barmoq tegishi oson bo'lishi uchun padding biroz kattalashtirildi */
            color: #f8fafc;
            font-size: 16px; /* 16px dan kichik bo'lsa iOS avtomatik zoom qilib yuboradi, bu UI ni buzadi */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-top: 0.375rem;
            margin-bottom: 1.25rem;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background-color: rgba(30, 41, 59, 0.85);
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.25rem;
            display: block;
            letter-spacing: 0.025em;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            color: white;
            font-weight: 600;
            padding: 0.875rem 1.5rem; /* Mobil qurilmalar uchun Touch Target (barmoq hududi) kengaytirildi */
            border-radius: 0.75rem;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary:hover, .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }

        /* Help text & error styles */
        .helptext {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: -0.875rem;
            margin-bottom: 1rem;
            display: block;
        }

        ul.errorlist {
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            list-style: none;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
        }

        /* Tizim xabarlari (Toasts) uchun animatsiya */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-message {
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

    
        /* MUKAMMAL MOBIL UI UCHUN QO'SHIMCHA SOZLAMALAR */
        html, body {
            overflow-x: hidden !important;
            width: 100% !important; /* 100vw o'rniga 100% ishlatsak gorizontal scrollbar chiqmaydi */
            max-width: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        
        .logo { white-space: nowrap !important; display: block !important; line-height: 1 !important; display: flex !important; align-items: center !important; }

        @media (max-width: 768px) {
            /* iOS da inputlarga bosganda ekran zoom bo'lib ketmasligi uchun */
            input, textarea, select { font-size: 16px !important; }
            
            /* Tepa panel moslashuvi (Notch kirmasligi uchun) */
            header {
                padding-top: env(safe-area-inset-top, 0px) !important;
                padding-left: 14px !important;
                padding-right: 14px !important;
                height: calc(64px + env(safe-area-inset-top, 0px)) !important;
            }
            .header-add-btn { width: 40px !important; height: 40px !important; }

            /* Asosiy kontent moslashuvi */
            .main-content {
                padding-top: calc(85px + env(safe-area-inset-top, 0px)) !important;
                padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px)) !important;
                padding-left: 0 !important; padding-right: 0 !important;
                margin-left: 0 !important; margin-right: 0 !important;
                width: 100% !important;
            }
            
            /* Grid va qidiruv bo'limlari chetidan joy qoldirish */
            .market-filter-bar, .builders-grid-layout, .profile-container, .form-container, .auth-wrapper {
                padding-left: 14px !important;
                padding-right: 14px !important;
            }

            /* Edge-to-Edge tweet cards */
            .twitter-feed { gap: 10px !important; margin-bottom: 30px !important; }
            .tweet-card {
                border-radius: 0 !important;
                border-left: none !important;
                border-right: none !important;
                margin-left: 0 !important; margin-right: 0 !important;
                border-top: 1px solid var(--border-color) !important;
                border-bottom: 1px solid var(--border-color) !important;
            }
            
            /* Bottom Nav (Pastki menyu moslashuvi) */
            .bottom-nav {
                display: flex !important;
                padding-bottom: env(safe-area-inset-bottom, 0px) !important;
                height: calc(65px + env(safe-area-inset-bottom, 0px)) !important;
                bottom: 0 !important; width: 100% !important; left: 0 !important;
                border-radius: 0 !important; border-left: none !important; border-right: none !important; border-bottom: none !important;
            }
            
            /* Modallar va Bottom sheets */
            .secure-modal-overlay { align-items: flex-end !important; padding: 0 !important; }
            .secure-modal, #contactModalInner {
                margin: 0 !important; max-width: 100% !important;
                border-radius: 32px 32px 0 0 !important; border-bottom: none !important;
            }
        }

    </style>
</head>

<body class="antialiased min-h-screen relative overflow-x-hidden selection:bg-purple-500/30 flex flex-col">

    <!-- ⚡️ GLOBAL TIZIM XABARLARI (Toasts) -->
    <!-- views.py dagi messages.success yoki messages.error lar barcha sahifalarda chiroyli chiqishi uchun -->
    {% if messages %}
        <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 w-[90%] max-w-sm sm:w-auto mx-auto sm:mx-0 left-0 sm:left-auto right-0 sm:right-4 pointer-events-none">
            {% for message in messages %}
                <div class="toast-message pointer-events-auto p-4 rounded-xl shadow-lg border backdrop-blur-md text-sm font-medium flex items-center gap-3
                    {% if message.tags == 'success' %}
                        bg-emerald-500/10 border-emerald-500/20 text-emerald-400
                    {% elif message.tags == 'error' %}
                        bg-red-500/10 border-red-500/20 text-red-400
                    {% else %}
                        bg-blue-500/10 border-blue-500/20 text-blue-400
                    {% endif %}
                ">
                    {% if message.tags == 'success' %}
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% elif message.tags == 'error' %}
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% endif %}
                    {{ message }}
                </div>
            {% endfor %}
        </div>

        <script>
            // Xabarlarni 4 soniyadan keyin avtomatik o'chirib yuborish
            setTimeout(() => {
                const toasts = document.querySelectorAll('.toast-message');
                toasts.forEach(toast => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    toast.style.transition = 'all 0.4s ease';
                    setTimeout(() => toast.remove(), 400);
                });
            }, 4000);
        </script>
    {% endif %}

    <!-- ASOSIY KONTENT -->
    <main class="flex-grow w-full flex flex-col relative">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
