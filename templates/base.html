{% load i18n %}
{% load static tailwind_tags %}
<!DOCTYPE html>
<!-- Tilni dinamik o'qiydigan qildim, SEO va brauzerlar uchun muhim -->
<html lang="{{ request.LANGUAGE_CODE|default:'uz' }}" class="dark">

<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <!-- Mobil qurilmalarda masshtabni to'g'ri ushlab turish va UI buzilmasligi uchun viewport yangilandi -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#05070c" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f4f6fa" media="(prefers-color-scheme: light)">
    <meta name="title" content="EasyBuild.uz - Qurilish platformasi">
    <meta name="description" content="EasyBuild.uz - O'zbekistonning eng zamonaviy qurilish va ustalar platformasi.">
    <!-- ⚡️ IMMEDIATE GLOBAL HAMBURGER DRAWER FUNCTIONS (HOISTED) -->
    <script>
        function openMobileDrawer() {
            const sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
            const overlay = document.getElementById('mobileDrawerOverlay');
            if (sidebar) {
                sidebar.classList.add('mobile-drawer-open', 'active', 'open');
                if (overlay) {
                    overlay.style.display = 'block';
                    overlay.classList.add('active', 'open');
                }
                document.body.style.overflow = 'hidden';
                document.documentElement.style.overflow = 'hidden';
            }
        }

        function closeMobileDrawer(e) {
            if (e && typeof e.stopPropagation === 'function') {
                e.stopPropagation();
            }
            const sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
            const overlay = document.getElementById('mobileDrawerOverlay');
            if (sidebar) {
                sidebar.classList.remove('mobile-drawer-open', 'active', 'open');
                if (overlay) {
                    overlay.style.display = 'none';
                    overlay.classList.remove('active', 'open');
                }
                document.body.style.overflow = '';
                document.documentElement.style.overflow = '';
            }
        }

        function toggleMobileDrawer(e) {
            if (e && typeof e.preventDefault === 'function') {
                e.preventDefault();
                e.stopPropagation();
            }
            const sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
            if (sidebar && (sidebar.classList.contains('mobile-drawer-open') || sidebar.classList.contains('active') || sidebar.classList.contains('open'))) {
                closeMobileDrawer(e);
            } else {
                openMobileDrawer();
            }
        }

        window.openMobileDrawer = openMobileDrawer;
        window.closeMobileDrawer = closeMobileDrawer;
        window.toggleMobileDrawer = toggleMobileDrawer;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .bg-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70vh; color: var(--watermark-color); opacity: var(--watermark-opacity); z-index: -2; pointer-events: none; transition: all 0.4s ease; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        /* 📱 MOBIL VA PREMIUM FORM STYLES */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem; /* Telefonda barmoq tegishi oson bo'lishi uchun padding biroz kattalashtirildi */
            color: #f8fafc;
            font-size: 16px; /* 16px dan kichik bo'lsa iOS avtomatik zoom qilib yuboradi, bu UI ni buzadi */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin-top: 0.375rem;
            margin-bottom: 1.25rem;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background-color: rgba(30, 41, 59, 0.85);
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.25rem;
            display: block;
            letter-spacing: 0.025em;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            color: white;
            font-weight: 600;
            padding: 0.875rem 1.5rem; /* Mobil qurilmalar uchun Touch Target (barmoq hududi) kengaytirildi */
            border-radius: 0.75rem;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn-primary:hover, .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }

        /* Help text & error styles */
        .helptext {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: -0.875rem;
            margin-bottom: 1rem;
            display: block;
        }

        ul.errorlist {
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            list-style: none;
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
        }

        /* Tizim xabarlari (Toasts) uchun animatsiya */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-message {
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

    
        /* ── GLOBAL INSTAGRAM DESIGN SYSTEM & LAYOUT RULES ── */
        html, body {
            overflow-x: hidden !important;
            width: 100% !important;
            max-width: 100vw !important;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        
        .logo { white-space: nowrap !important; display: flex !important; align-items: center !important; line-height: 1 !important; }

        /* ── STRICT Z-INDEX SYSTEM ── */
        .main-content { z-index: 1; }
        header { z-index: 50 !important; }
        .bottom-nav { z-index: 100 !important; }
        .sa-modal, .secure-modal-overlay { z-index: 500 !important; }
        .sidebar-container.mobile-drawer-open, .sidebar-container.active, .sidebar-container.open, #sideDrawer.active, #sideDrawer.open, .offcanvas-menu.active, .offcanvas-menu.open { z-index: 100000 !important; }
        .toast-message, #toastNotif, #market-toast { z-index: 999999 !important; }

        /* ── LIGHT MODE & DARK MODE BOTTOM NAV ADAPTATION ── */
        [data-theme="light"] .bottom-nav {
            background: rgba(255, 255, 255, 0.94) !important;
            border-top: 1px solid rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.06) !important;
        }
        [data-theme="light"] .bottom-nav-item {
            color: #64748b !important;
        }
        [data-theme="light"] .bottom-nav-item.active {
            color: #ff6b00 !important;
        }
        [data-theme="light"] .bottom-nav-avatar {
            border-color: rgba(0, 0, 0, 0.15) !important;
        }

        /* 🚀 MASTER PREMIUM OFF-CANVAS SIDE DRAWER CSS (MOBILE & TABLET) */
        @media (max-width: 1024px) {
            /* 1. Hide sidebar off-screen by default on mobile/tablet */
            .sidebar-container, #sideDrawer, .offcanvas-menu {
                display: flex !important;
                flex-direction: column !important;
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                width: 290px !important;
                max-width: 88vw !important;
                height: 100vh !important;
                height: 100dvh !important;
                z-index: 100000 !important;
                background: linear-gradient(160deg, #0d1117 0%, #111827 50%, #0d1117 100%) !important;
                backdrop-filter: blur(40px) !important;
                -webkit-backdrop-filter: blur(40px) !important;
                border-right: 1px solid rgba(255, 107, 0, 0.12) !important;
                box-shadow: 8px 0 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04) inset !important;
                transform: translateX(-100%) !important;
                transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1) !important;
                opacity: 1 !important;
                visibility: hidden !important;
                pointer-events: none !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: hidden !important;
            }

            /* Light mode drawer */
            [data-theme="light"] .sidebar-container,
            [data-theme="light"] #sideDrawer,
            [data-theme="light"] .offcanvas-menu {
                background: linear-gradient(160deg, #ffffff 0%, #f8fafc 50%, #ffffff 100%) !important;
                border-right: 1px solid rgba(255, 107, 0, 0.15) !important;
                box-shadow: 8px 0 60px rgba(0,0,0,0.15) !important;
            }

            /* 2. When open, slide in as a full drawer */
            .sidebar-container.mobile-drawer-open,
            .sidebar-container.active,
            .sidebar-container.open,
            .sidebar-container.expanded,
            #sideDrawer.active,
            #sideDrawer.open,
            .offcanvas-menu.active,
            .offcanvas-menu.open {
                transform: translateX(0) !important;
                visibility: visible !important;
                pointer-events: auto !important;
            }

            /* 3. Hide narrow desktop icon-rail completely on mobile */
            .sidebar-container .icon-rail,
            #sideDrawer .icon-rail,
            .offcanvas-menu .icon-rail {
                display: none !important;
            }

            /* 4. Show full expanded menu with labels and smooth scrolling */
            .sidebar-container .expanded-menu,
            #sideDrawer .expanded-menu,
            .offcanvas-menu .expanded-menu {
                display: flex !important;
                flex-direction: column !important;
                width: 100% !important;
                height: 100% !important;
                opacity: 1 !important;
                visibility: visible !important;
                margin: 0 !important;
                padding: 0 16px calc(40px + env(safe-area-inset-bottom, 0px)) 16px !important;
                pointer-events: auto !important;
                border: none !important;
                box-shadow: none !important;
                overflow-y: auto !important;
                transform: none !important;
                background: transparent !important;
                -webkit-overflow-scrolling: touch !important;
            }

            .expanded-menu .menu-col {
                min-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
                height: auto !important;
            }

            /* Premium drawer header */
            .expanded-menu .menu-title {
                font-size: 17px !important;
                font-weight: 800 !important;
                margin-bottom: 8px !important;
                padding: calc(env(safe-area-inset-top, 0px) + 20px) 4px 18px 4px !important;
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
                width: 100% !important;
                border-bottom: 1px solid rgba(255, 107, 0, 0.12) !important;
                color: #f8fafc !important;
                letter-spacing: -0.3px !important;
                flex-shrink: 0 !important;
            }

            [data-theme="light"] .expanded-menu .menu-title {
                color: #0f172a !important;
                border-bottom-color: rgba(255, 107, 0, 0.15) !important;
            }

            .expanded-menu .menu-title .drawer-close-btn {
                width: 36px !important;
                height: 36px !important;
                min-width: 36px !important;
                border-radius: 10px !important;
                background: rgba(255, 107, 0, 0.1) !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                color: #ff6b00 !important;
                cursor: pointer !important;
                transition: background 0.2s, transform 0.15s !important;
                font-size: 15px !important;
                flex-shrink: 0 !important;
                padding: 0 !important;
            }
            .expanded-menu .menu-title .drawer-close-btn:active {
                transform: scale(0.9) !important;
                background: rgba(255, 107, 0, 0.2) !important;
            }

            .expanded-menu .menu-list {
                display: flex !important;
                flex-direction: column !important;
                gap: 3px !important;
                margin-top: 12px !important;
            }

            .expanded-menu .menu-list li a {
                display: flex !important;
                align-items: center !important;
                padding: 13px 14px !important;
                font-size: 15px !important;
                font-weight: 600 !important;
                border-radius: 14px !important;
                color: #94a3b8 !important;
                transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease !important;
                text-decoration: none !important;
                line-height: 1 !important;
            }

            [data-theme="light"] .expanded-menu .menu-list li a {
                color: #475569 !important;
            }

            .expanded-menu .menu-list li a:active {
                transform: scale(0.97) !important;
            }

            .expanded-menu .menu-list li a:hover,
            .expanded-menu .menu-list li a.active-link {
                background: rgba(255, 107, 0, 0.12) !important;
                color: #ff6b00 !important;
            }

            [data-theme="light"] .expanded-menu .menu-list li a:hover,
            [data-theme="light"] .expanded-menu .menu-list li a.active-link {
                background: rgba(255, 107, 0, 0.1) !important;
                color: #ff6b00 !important;
            }

            .expanded-menu .menu-list li a i.main-icon {
                font-size: 17px !important;
                margin-right: 14px !important;
                width: 22px !important;
                text-align: center !important;
                flex-shrink: 0 !important;
            }

            /* section label inside drawer */
            .expanded-menu .section-label {
                font-size: 10px !important;
                font-weight: 700 !important;
                text-transform: uppercase !important;
                letter-spacing: 1.2px !important;
                color: rgba(148, 163, 184, 0.6) !important;
                margin: 16px 4px 6px 14px !important;
                display: block !important;
            }

            /* iOS Input Zoom Prevention */
            input, textarea, select { font-size: 16px !important; }

            /* Top Header Notch Alignment */
            header {
                padding-top: env(safe-area-inset-top, 0px) !important;
                padding-left: 14px !important;
                padding-right: 14px !important;
                height: calc(64px + env(safe-area-inset-top, 0px)) !important;
            }
            .header-add-btn { width: 40px !important; height: 40px !important; }

            /* Safe Main Content Padding */
            .main-content {
                padding-top: calc(80px + env(safe-area-inset-top, 0px)) !important;
                padding-bottom: calc(85px + env(safe-area-inset-bottom, 0px)) !important;
                padding-left: 12px !important; padding-right: 12px !important;
                margin-left: 0 !important; margin-right: 0 !important;
                width: 100% !important;
            }

            /* Responsive Grid & Container Spacing */
            .market-filter-bar, .builders-grid-layout, .profile-container, .form-container, .auth-wrapper {
                padding-left: 12px !important;
                padding-right: 12px !important;
            }

            /* Modals & Bottom sheets */
            .secure-modal-overlay { align-items: flex-end !important; padding: 0 !important; }
            .secure-modal, #contactModalInner {
                margin: 0 !important; max-width: 100% !important;
                border-radius: 28px 28px 0 0 !important; border-bottom: none !important;
            }
        }

    </style>
</head>

<body class="antialiased min-h-screen relative overflow-x-hidden selection:bg-purple-500/30 flex flex-col">

    <!-- ⚡️ GLOBAL TIZIM XABARLARI (Toasts) -->
    <!-- views.py dagi messages.success yoki messages.error lar barcha sahifalarda chiroyli chiqishi uchun -->
    {% if messages %}
        <div class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 w-[90%] max-w-sm sm:w-auto mx-auto sm:mx-0 left-0 sm:left-auto right-0 sm:right-4 pointer-events-none">
            {% for message in messages %}
                <div class="toast-message pointer-events-auto p-4 rounded-xl shadow-lg border backdrop-blur-md text-sm font-medium flex items-center gap-3
                    {% if message.tags == 'success' %}
                        bg-emerald-500/10 border-emerald-500/20 text-emerald-400
                    {% elif message.tags == 'error' %}
                        bg-red-500/10 border-red-500/20 text-red-400
                    {% else %}
                        bg-blue-500/10 border-blue-500/20 text-blue-400
                    {% endif %}
                ">
                    {% if message.tags == 'success' %}
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% elif message.tags == 'error' %}
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% endif %}
                    {{ message }}
                </div>
            {% endfor %}
        </div>

        <script>
            // Xabarlarni 4 soniyadan keyin avtomatik o'chirib yuborish
            setTimeout(() => {
                const toasts = document.querySelectorAll('.toast-message');
                toasts.forEach(toast => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    toast.style.transition = 'all 0.4s ease';
                    setTimeout(() => toast.remove(), 400);
                });
            }, 4000);
        </script>
    {% endif %}

    <!-- ASOSIY KONTENT -->
    <main class="flex-grow w-full flex flex-col relative">
        {% block content %}
        {% endblock %}
    </main>

    <!-- ⚡️ GLOBAL HAMBURGER MENU DRAWER OVERLAY -->
    <div id="mobileDrawerOverlay" onclick="window.closeMobileDrawer(event)" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:99999; opacity:0; transition:opacity 0.35s ease;"></div>

    <script>
        // Override open/close to animate overlay properly
        (function() {
            var _origOpen = window.openMobileDrawer;
            var _origClose = window.closeMobileDrawer;

            window.openMobileDrawer = function() {
                var overlay = document.getElementById('mobileDrawerOverlay');
                if (overlay) {
                    overlay.style.display = 'block';
                    requestAnimationFrame(function() {
                        overlay.style.opacity = '1';
                    });
                }
                var sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
                if (sidebar) {
                    sidebar.classList.add('mobile-drawer-open', 'active', 'open');
                }
                document.body.style.overflow = 'hidden';
                document.documentElement.style.overflow = 'hidden';
            };

            window.closeMobileDrawer = function(e) {
                if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
                var overlay = document.getElementById('mobileDrawerOverlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                    setTimeout(function() { overlay.style.display = 'none'; }, 350);
                }
                var sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
                if (sidebar) {
                    sidebar.classList.remove('mobile-drawer-open', 'active', 'open');
                }
                document.body.style.overflow = '';
                document.documentElement.style.overflow = '';
            };

            window.toggleMobileDrawer = function(e) {
                if (e && typeof e.preventDefault === 'function') { e.preventDefault(); e.stopPropagation(); }
                var sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
                if (sidebar && (sidebar.classList.contains('mobile-drawer-open') || sidebar.classList.contains('active') || sidebar.classList.contains('open'))) {
                    window.closeMobileDrawer(e);
                } else {
                    window.openMobileDrawer();
                }
            };
        })();
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Click handler for hamburger triggers and close buttons
            document.addEventListener('click', function(e) {
                const burgerBtn = e.target.closest('.menu-hamburger, #hamburgerBtn, .hamburger-trigger');
                if (burgerBtn) {
                    toggleMobileDrawer(e);
                    return;
                }

                const closeBtn = e.target.closest('#closeDrawerBtn, .drawer-close-btn, .drawer-overlay, #mobileDrawerOverlay');
                if (closeBtn) {
                    closeMobileDrawer(e);
                    return;
                }

                const sidebar = document.querySelector('.sidebar-container, #sideDrawer, .offcanvas-menu');
                if (sidebar && (sidebar.classList.contains('mobile-drawer-open') || sidebar.classList.contains('active') || sidebar.classList.contains('open'))) {
                    if (!sidebar.contains(e.target)) {
                        closeMobileDrawer(e);
                    }
                }
            });

            // Escape Key listener
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' || e.key === 'Esc') {
                    closeMobileDrawer(e);
                }
            });
        });
    </script>
</body>
</html>
