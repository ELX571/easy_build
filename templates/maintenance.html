{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Texnik Tanaffus — EasyBuild" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0a0a0f;
            --card-bg: #12121a;
            --accent-orange: #ff6b00;
            --accent-glow: rgba(255, 107, 0, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Glow Background */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 0, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 540px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px var(--accent-glow);
            backdrop-filter: blur(12px);
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .brand-logo i {
            color: var(--accent-orange);
            font-size: 1.6rem;
        }

        .icon-box {
            width: 90px;
            height: 90px;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.8rem;
            box-shadow: 0 0 30px var(--accent-glow);
            animation: pulseGlow 2.5s infinite ease-in-out;
        }

        .icon-box i {
            font-size: 2.5rem;
            color: var(--accent-orange);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 2.2rem;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 107, 0, 0.12);
            border: 1px solid rgba(255, 107, 0, 0.3);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-orange);
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-orange);
            animation: blink 1.5s infinite;
        }

        .btn-retry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #ff6b00, #e05d00);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 0, 0.35);
            width: 100%;
            cursor: pointer;
            border: none;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 0, 0.5);
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 25px var(--accent-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 45px rgba(255, 107, 0, 0.45); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="container">
        <div class="brand-logo">
            <i class="fa-solid fa-helmet-safety"></i> EASYBUILD
        </div>

        <div class="icon-box">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>

        <div class="status-pill">
            <div class="status-dot"></div>
            {% trans "Profilaktika ishlari ketmoqda" %}
        </div>

        <h1>{% trans "Texnik Tanaffus" %}</h1>

        <p>{{ maintenance_message }}</p>

        <button onclick="window.location.reload()" class="btn-retry">
            <i class="fa-solid fa-rotate-right"></i> {% trans "Sahifani Yangilash" %}
        </button>
    </div>
</body>
</html>
