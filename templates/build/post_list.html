<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Font Awesome (Ikonkalar uchun) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Umumiy Stillar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 85%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Navigatsiya (Header) */
        header {
            background: rgba(255, 255, 255, 0.95);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #2563eb;
            text-decoration: none;
        }

        .logo span {
            color: #0f172a;
        }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #475569;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #2563eb;
        }

        .btn-contact {
            background: #2563eb;
            color: #fff !important;
            padding: 8px 20px;
            border-radius: 25px;
            transition: background 0.3s !important;
        }

        .btn-contact:hover {
            background: #1d4ed8;
        }

        /* Hero Bo'limi (Asosiy ekran) */
        .hero {
            padding: 180px 0 100px 0;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            display: flex;
            align-items: center;
            min-height: 90vh;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 48px;
            color: #0f172a;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h1 span {
            color: #2563eb;
        }

        .hero-text p {
            font-size: 18px;
            color: #475569;
            margin-bottom: 30px;
        }

        .cta-buttons .btn {
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-right: 15px;
            transition: transform 0.3s;
        }

        .cta-buttons .btn:hover {
            transform: translateY(-3px);
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #2563eb;
            border: 2px solid #2563eb;
        }

        .hero-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Xizmatlar Bo'limi */
        .services {
            padding: 100px 0;
            background: #fff;
            text-align: center;
        }

        .section-title {
            font-size: 36px;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: #64748b;
            margin-bottom: 60px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            padding: 40px 30px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .service-card:hover {
            background: #fff;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-bottom: 4px solid #2563eb;
        }

        .service-card i {
            font-size: 40px;
            color: #2563eb;
            margin-bottom: 20px;
        }

        .service-card h3 {
            font-size: 22px;
            color: #0f172a;
            margin-bottom: 15px;
        }

        /* Footer (Sayt cheki) */
        footer {
            background: #0f172a;
            color: #94a3b8;
            padding: 60px 0 30px 0;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 50px;
            margin-bottom: 40px;
        }

        .footer-about h3 {
            color: #fff;
            margin-bottom: 20px;
        }

        .footer-links h4 {
            color: #fff;
            margin-bottom: 20px;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links ul li {
            margin-bottom: 10px;
        }

        .footer-links ul li a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links ul li a:hover {
            color: #2563eb;
        }

        .social-icons a {
            color: #fff;
            font-size: 20px;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #2563eb;
        }

        hr {
            border: 0;
            border-top: 1px solid #334155;
            margin-bottom: 30px;
        }

        .copy {
            text-align: center;
            font-size: 14px;
        }

        /* Moslashuvchanlik (Responsive) */
        @media (max-width: 768px) {
            .hero-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .nav-links {
                display: none; /* Mobil menyu uchun (oddiy variantda yashirildi) */
            }
            .hero-text h1 {
                font-size: 36px;
            }
            .cta-buttons .btn {
                margin-bottom: 15px;
            }
            .footer-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
