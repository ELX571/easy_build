{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <meta name="theme-color" content="#05070c" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f4f6fa" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Easy Build - Market Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg-body: #05070c; --bg-panel: #111115; --text-main: #f8fafc; --active-text-blue: #ff6b00; --border-color: #2d2d35; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; padding-bottom: 90px; }

        /* 📱 MOBIL LAYOUT */
        header {
            background: rgba(17,17,21,0.9); backdrop-filter: blur(20px);
            position: fixed; top: 0; width: 100%; height: 64px; z-index: 1000;
            padding: env(safe-area-inset-top) 16px 0 16px;
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;
        }

        .main-content { padding: 80px 0 20px 0; }

        .twitter-feed { width: 100%; max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .tweet-card {
            background: var(--bg-panel); border-radius: 0; padding: 16px;
            border-bottom: 1px solid var(--border-color); border-top: 1px solid var(--border-color);
        }

        /* SEARCH BAR MOBILE */
        .market-filter-bar { padding: 0 16px; margin-bottom: 16px; }
        .search-wrapper { border-radius: 16px; background: rgba(255,255,255,0.05); }
        .premium-search-input { height: 50px; font-size: 16px; padding-left: 45px; }

        /* BOTTOM NAV */
        .bottom-nav {
            display: flex; position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: var(--bg-panel); border-top: 1px solid var(--border-color);
            z-index: 1000; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-item { color: var(--text-muted); font-size: 20px; text-decoration: none; }
        .bottom-nav-item.active { color: var(--active-text-blue); }
        .add-btn {
            background: var(--active-text-blue); color: #fff; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transform: translateY(-20px); box-shadow: 0 8px 20px rgba(255,107,0,0.3);
        }
    
        /* Anti-bounce and App-like scrolling */
        html, body { overscroll-behavior-x: none; overscroll-behavior-y: none; }
        .main-content { overscroll-behavior-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* Hide bottom nav when virtual keyboard is open */
        @media (max-height: 450px) {
            .bottom-nav { display: none !important; }
            body { padding-bottom: 0 !important; }
        }

    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; font-size: 20px; color: var(--active-text-blue);">Easy<span>Build</span></div>
        <a href="{% url 'build:profile' %}"><img src="{{ user.profile.get_avatar_url }}" style="width:35px;height:35px;border-radius:50%;object-fit:cover;"></a>
    </header>

    <div class="main-content">
        <div class="market-filter-bar">
            <form method="GET" action="{% url 'build:home' %}">
                <div class="search-wrapper">
                    <input type="text" name="q" placeholder="{% trans 'Qidirish...' %}" value="{{ request.GET.q }}" class="premium-search-input" style="width:100%; border:none; background:transparent; color:white; outline:none;">
                </div>
            </form>
        </div>

        <div class="twitter-feed">
            {% for post in posts %}
                <div class="tweet-card">
                    <div class="tweet-header">
                        <img src="{{ post.author.profile.get_avatar_url }}" style="width:40px;height:40px;border-radius:50%;">
                        <div style="font-weight:700;">{{ post.author.username }}</div>
                    </div>
                    <div class="tweet-body">
                        <h3 style="color:var(--active-text-blue); margin-bottom:8px;">{{ post.title }}</h3>
                        {{ post.description }}
                    </div>
                    {% if post.image %}<img src="{{ post.image.url }}" class="tweet-image">{% endif %}
                </div>
            {% endfor %}
        </div>
    </div>

    <div class="bottom-nav">
        <a href="{% url 'build:home' %}" class="bottom-nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}"><i class="fa-solid fa-house"></i></a>
        <a href="{% url 'build:network' %}" class="bottom-nav-item"><i class="fa-solid fa-users"></i></a>
        <a href="{% url 'build:post_create' %}" class="bottom-nav-item add-btn"><i class="fa-solid fa-plus"></i></a>
        <a href="{% url 'build:builder_list' %}" class="bottom-nav-item"><i class="fa-solid fa-helmet-safety"></i></a>
        <a href="{% url 'chat:chat' %}" class="bottom-nav-item"><i class="fa-regular fa-comment"></i></a>
    </div>


    <script>
        // PWA App-like Virtual Keyboard handling
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', () => document.body.classList.add('keyboard-open'));
                input.addEventListener('blur', () => document.body.classList.remove('keyboard-open'));
            });
        });
    </script>

</body>
</html>
